name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  REGISTRY: docker.io
  CONFIGURATION: Release
  ALLOW_MISSING_PRUNE: -p:AllowMissingPrunePackageData=true

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute release version
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          IFS='.' read -r major minor patch <<< "$version"
          version_code=$((major * 10000 + minor * 100 + patch))

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Extract Release Notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(tag)}\].*?$([\s\S]*?)(?=^## \[|\Z)"
          match = re.search(pattern, changelog, flags=re.MULTILINE)

          if not match:
              raise SystemExit(f"Could not find release notes for {tag} in CHANGELOG.md")

          notes = match.group(1).strip()
          if not notes:
              raise SystemExit(f"Release notes for {tag} are empty")

          Path("RELEASE_NOTES.md").write_text(notes + "\n", encoding="utf-8")
          PY

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  docker-images:
    runs-on: ubuntu-latest
    needs: metadata
    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_PASSWORD }}

      - name: Build and push release images
        if: env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PASSWORD != ''
        run: |
          services=(
            "coffeepeek.accountservice:CoffeePeek.AccountService/AccountService.Dockerfile"
            "coffeepeek.shopsservice:CoffeePeek.ShopsService/ShopsService.Dockerfile"
            "coffeepeek.moderationservice:CoffeePeek.ModerationService/ModerationService.Dockerfile"
            "coffeepeek.mediaservice:CoffeePeek.MediaService/MediaService.Dockerfile"
            "gateway:CoffeePeek.Gateway/Gateway.Dockerfile"
          )

          mkdir -p release-assets
          {
            echo "### Docker images"
            echo
          } > release-assets/docker-images.md

          for item in "${services[@]}"; do
            image="${item%%:*}"
            dockerfile="${item#*:}"
            ref="${REGISTRY}/${DOCKER_HUB_USERNAME}/${image}"

            docker buildx build \
              --file "$dockerfile" \
              --tag "${ref}:${GITHUB_REF_NAME}" \
              --tag "${ref}:latest" \
              --push \
              .

            echo "- \`${ref}:${GITHUB_REF_NAME}\`" >> release-assets/docker-images.md
          done

      - name: Record skipped Docker publishing
        if: env.DOCKER_HUB_USERNAME == '' || env.DOCKER_HUB_PASSWORD == ''
        run: |
          mkdir -p release-assets
          {
            echo "### Docker images"
            echo
            echo "Docker publishing was skipped because Docker Hub credentials are not configured."
          } > release-assets/docker-images.md

      - name: Upload Docker image references
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-references
          path: release-assets/docker-images.md


  create-release:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - docker-images
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find release-downloads -type f ! -name 'RELEASE_NOTES.md' ! -name 'docker-images.md' -exec cp {} release-assets/ \;

          if [ -f release-downloads/release-notes/RELEASE_NOTES.md ]; then
            cp release-downloads/release-notes/RELEASE_NOTES.md RELEASE_NOTES.md
          else
            echo "Release notes are missing." > RELEASE_NOTES.md
          fi

          if [ -f release-downloads/docker-image-references/docker-images.md ]; then
            {
              echo
              cat release-downloads/docker-image-references/docker-images.md
            } >> RELEASE_NOTES.md
          fi

          if find release-assets -type f | grep -q .; then
            (cd release-assets && sha256sum * > SHA256SUMS)
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}