name: CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore "CoffePeek.sln"

      - name: Build solution
        run: dotnet build "CoffePeek.sln" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "CoffePeek.sln" --configuration Release --no-build --no-restore

  build_and_push_images:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    env:
      REGISTRY: docker.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set image tag
        id: vars
        run: echo "TAG=dev" >> "$GITHUB_OUTPUT"

      - name: Build and push AccountService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.AccountService/AccountService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.accountservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.accountservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push AuthService OutboxBackgroundService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: OutboxBackgroundService/OutboxBackgroundService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.authservice.outbox-bg:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.authservice.outbox-bg:${{ steps.vars.outputs.TAG }}

      - name: Build and push ShopsService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.ShopsService/ShopsService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.shopsservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.shopsservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push ModerationService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.ModerationService/ModerationService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.moderationservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.moderationservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push JobVacancies image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.JobVacancies/JobVacancies.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.jobvacancies:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.jobvacancies:${{ steps.vars.outputs.TAG }}

      - name: Build and push Gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.Gateway/Gateway.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/gateway:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/gateway:${{ steps.vars.outputs.TAG }}


  apply_migrations:
    #needs: build_and_push_images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
  
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: dotnet restore
  
      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef
  
      - name: Apply Migrations
        env:
          DB_CONN_ACCOUNT: ${{ secrets.DB_CONNECTION_ACCOUNT }}
          DB_CONN_SHOPS: ${{ secrets.DB_CONNECTION_SHOPS }}
          DB_CONN_JOBS: ${{ secrets.DB_CONNECTION_JOBS }}
          DB_CONN_MODERATION: ${{ secrets.DB_CONNECTION_MODERATION }}
        run: |
          echo "Applying AccountService migrations..."
          cd CoffeePeek.AccountService
          dotnet ef database update \
          --context AccountDbContext \
          --project ../CoffeePeek.Account.Infrastructure/CoffeePeek.Account.Infrastructure.csproj \
          --startup-project CoffeePeek.AccountService.csproj \
          --connection "$DB_CONN_ACCOUNT"

          cd ../CoffeePeek.ShopsService
          echo "Applying ShopsService migrations..."
          dotnet ef database update \
          --context ShopsDbContext \
          --project ../CoffeePeek.Shops.Infrastructure/CoffeePeek.Shops.Infrastructure.csproj \
          --startup-project CoffeePeek.ShopsService.csproj \
          --connection "$DB_CONN_SHOPS"
          
          cd ../CoffeePeek.ModerationService
          echo "Applying ModerationService migrations..."
          dotnet ef database update \
          --context ModerationDbContext \
          --project ../CoffeePeek.Moderation.Infrastructure/CoffeePeek.Moderation.Infrastructure.csproj \
          --startup-project CoffeePeek.ModerationService.csproj \
          --connection "$DB_CONN_MODERATION"
          
          cd ../CoffeePeek.JobVacancies
          echo "Applying JobsService migrations..."
          dotnet ef database update \
          --context JobVacanciesDbContext \
          --project ../CoffeePeek.JobVacancies.Infrastructure/CoffeePeek.JobVacancies.Infrastructure.csproj \
          --startup-project CoffeePeek.JobVacancies.csproj \
          --connection "$DB_CONN_JOBS"