name: CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use user-local .NET install (workloads + cache)
        run: echo "DOTNET_INSTALL_DIR=$HOME/.dotnet" >> "$GITHUB_ENV"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Cache .NET workloads
        uses: actions/cache@v4
        with:
          path: ~/.dotnet
          key: ${{ runner.os }}-dotnet-wl-v3-${{ hashFiles('global.json') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-wl-v3-

      - name: Restore .NET workloads
        run: dotnet workload restore "CoffeePeek.slnx"

      - name: Restore NuGet packages
        run: dotnet restore "CoffeePeek.slnx" -p:AllowMissingPrunePackageData=true

      - name: Audit dependencies
        continue-on-error: true
        run: |
          set -uo pipefail
          set +e
          report="$(dotnet list "CoffeePeek.slnx" package --vulnerable --include-transitive 2>&1)"
          set -e
          echo "$report"
          {
            echo "### Vulnerable packages report"
            echo '```'
            echo "$report"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if echo "$report" | grep -qiE '>\s*Project|has the following vulnerable'; then
            echo "::warning::Vulnerable NuGet packages reported by dotnet list; see the step log and job summary"
          fi

      - name: Build solution
        run: |
          projects=(
            "CoffeePeek.AccountService/CoffeePeek.AccountService.csproj"
            "CoffeePeek.ShopsService/CoffeePeek.ShopsService.csproj"
            "CoffeePeek.ModerationService/CoffeePeek.ModerationService.csproj"
            "CoffeePeek.MediaService/CoffeePeek.MediaService.csproj"
            "CoffeePeek.Gateway/CoffeePeek.Gateway.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet build "$project" --configuration Release --no-restore -p:AllowMissingPrunePackageData=true
          done

      - name: Run tests
        run: |
          projects=(
            "CoffeePeek.Account.Application.Tests/CoffeePeek.Account.Application.Tests.csproj"
            "CoffeePeek.Account.Domain.Tests/CoffeePeek.Account.Domain.Tests.csproj"
            "CoffeePeek.Account.Infrastructure.Tests/CoffeePeek.Account.Infrastructure.Tests.csproj"
            "CoffeePeek.Shops.Domain.Tests/CoffeePeek.Shops.Domain.Tests.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet test "$project" --configuration Release --no-restore -p:AllowMissingPrunePackageData=true
          done

  build_and_push_images:
    needs: build_and_test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    env:
      REGISTRY: docker.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set image tag
        id: vars
        run: echo "TAG=dev" >> "$GITHUB_OUTPUT"

      - name: Build and push AccountService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.AccountService/AccountService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.accountservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.accountservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push ShopsService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.ShopsService/ShopsService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.shopsservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.shopsservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push ModerationService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.ModerationService/ModerationService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.moderationservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.moderationservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push MediaService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.MediaService/MediaService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.mediaservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.mediaservice:${{ steps.vars.outputs.TAG }}
            
      - name: Build and push Gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.Gateway/Gateway.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/gateway:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/gateway:${{ steps.vars.outputs.TAG }}  

  apply_migrations:
    needs: build_and_push_images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
  
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Restore dependencies
        run: |
          set -euo pipefail
          projects=(
            "CoffeePeek.AccountService/CoffeePeek.AccountService.csproj"
            "CoffeePeek.ShopsService/CoffeePeek.ShopsService.csproj"
            "CoffeePeek.ModerationService/CoffeePeek.ModerationService.csproj"
            "CoffeePeek.MediaService/CoffeePeek.MediaService.csproj"
          )
          for project in "${projects[@]}"; do
            dotnet restore "$project" -p:AllowMissingPrunePackageData=true
          done
  
      - name: Install dotnet-ef tool
        run: dotnet tool install --global dotnet-ef
  
      - name: Apply Migrations
        env:
          PostgresCpOptions__ConnectionString: ${{ secrets.DB_CONNECTION_ACCOUNT }}
          
        run: |
          projects=(
            "CoffeePeek.AccountService/CoffeePeek.AccountService.csproj"
            "CoffeePeek.ShopsService/CoffeePeek.ShopsService.csproj"
            "CoffeePeek.ModerationService/CoffeePeek.ModerationService.csproj"
            "CoffeePeek.MediaService/CoffeePeek.MediaService.csproj"
          )

          for project in "${projects[@]}"; do
            dotnet build "$project" --configuration Release --no-restore -p:AllowMissingPrunePackageData=true
          done
          
          echo "--- Applying AccountService migrations ---"
          export PostgresCpOptions__ConnectionString="${{ secrets.DB_CONNECTION_ACCOUNT }}"
          dotnet ef database update \
            --context AccountDbContext \
            --project CoffeePeek.Account.Persistence/CoffeePeek.Account.Persistence.csproj \
            --startup-project CoffeePeek.AccountService/CoffeePeek.AccountService.csproj \
            --connection "${{ secrets.DB_CONNECTION_ACCOUNT }}" \
            --configuration Release \
            --no-build

          echo "--- Applying ShopsService migrations ---"
          export PostgresCpOptions__ConnectionString="${{ secrets.DB_CONNECTION_SHOPS }}"
          dotnet ef database update \
            --context ShopsDbContext \
            --project CoffeePeek.Shops.Persistance/CoffeePeek.Shops.Persistance.csproj \
            --startup-project CoffeePeek.ShopsService/CoffeePeek.ShopsService.csproj \
            --connection "${{ secrets.DB_CONNECTION_SHOPS }}" \
            --configuration Release \
            --no-build

          echo "--- Applying ModerationService migrations ---"
          export PostgresCpOptions__ConnectionString="${{ secrets.DB_CONNECTION_MODERATION }}"
          dotnet ef database update \
            --context ModerationDbContext \
            --project CoffeeShop.Moderation.Persistence/CoffeeShop.Moderation.Persistence.csproj \
            --startup-project CoffeePeek.ModerationService/CoffeePeek.ModerationService.csproj \
            --connection "${{ secrets.DB_CONNECTION_MODERATION }}" \
            --configuration Release \
            --no-build

          echo "--- Applying MediaService migrations ---"
          dotnet ef database update \
            --context MediaDbContext \
            --project CoffeePeek.MediaService/CoffeePeek.MediaService.csproj \
            --startup-project CoffeePeek.MediaService/CoffeePeek.MediaService.csproj \
            --connection "${{ secrets.DB_CONNECTION_MEDIA }}" \
            --configuration Release \
            --no-build