name: CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore "CoffePeek.sln"

      - name: Build solution
        run: dotnet build "CoffePeek.sln" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "CoffePeek.sln" --configuration Release --no-build --no-restore

  build_and_push_images:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    env:
      REGISTRY: docker.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push AuthService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.AuthService/AuthService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.authservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.authservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push AuthService OutboxBackgroundService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: OutboxBackgroundService/OutboxBackgroundService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.authservice.outbox-bg:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.authservice.outbox-bg:${{ steps.vars.outputs.TAG }}

      - name: Build and push UserService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.UserService/UserService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.userservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.userservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push ShopsService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.ShopsService/ShopsService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.shopsservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.shopsservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push ModerationService image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.ModerationService/ModerationService.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.moderationservice:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.moderationservice:${{ steps.vars.outputs.TAG }}

      - name: Build and push JobVacancies image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.JobVacancies/JobVacancies.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.jobvacancies:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/coffeepeek.jobvacancies:${{ steps.vars.outputs.TAG }}

      - name: Build and push Gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: CoffeePeek.Gateway/Gateway.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/gateway:dev
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/gateway:${{ steps.vars.outputs.TAG }}

  deploy_railway:
    needs: build_and_push_images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy services on Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "Images pushed with tag ${SHORT_SHA}."
          echo "Docker Hub username: ${DOCKER_HUB_USERNAME}"
          
          # Login to Railway
          railway login --token $RAILWAY_TOKEN
          
          # Link to project if RAILWAY_PROJECT_ID is provided
          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            railway link $RAILWAY_PROJECT_ID --non-interactive || echo "Project already linked or link failed"
          fi
          
          # Function to update service Docker image via Railway CLI
          update_service_image() {
            local service_name=$1
            local image_name=$2
            local image_tag="docker.io/${DOCKER_HUB_USERNAME}/${image_name}:${SHORT_SHA}"
            
            echo "Updating service '${service_name}' to use image ${image_tag}"
            
            # Try to set DOCKER_IMAGE variable for the service
            railway variables set DOCKER_IMAGE="${image_tag}" --service "${service_name}" 2>&1 || \
            railway variables set IMAGE="${image_tag}" --service "${service_name}" 2>&1 || \
            echo "Warning: Could not update service '${service_name}'. Service may not exist or name mismatch."
          }
          
          # Update each service (service names should match Railway service names)
          # If service names differ, update them to match your Railway project
          update_service_image "coffeepeekauthservice.railway.internal" "coffeepeek.authservice"
          update_service_image "authservice-outbox" "coffeepeek.authservice.outbox-bg"
          update_service_image "coffeepeekuserservice.railway.internal" "coffeepeek.userservice"
          update_service_image "coffeepeekshopsservice.railway.internal" "coffeepeek.shopsservice"
          update_service_image "coffeepeekmoderationservice.railway.internal" "coffeepeek.moderationservice"
          update_service_image "coffeepeekjobvacancies.railway.internal" "coffeepeek.jobvacancies"
          update_service_image "gateway.railway.internal" "gateway"
          
          echo ""
          echo "=== Deployment Summary ==="
          echo "Images are available with tag: ${SHORT_SHA}"
          echo "If Railway services are configured to use DOCKER_IMAGE variable, they will pull new images."
          echo "Otherwise, update service settings manually in Railway dashboard:"
          echo "  - Set DOCKER_IMAGE to: docker.io/${DOCKER_HUB_USERNAME}/<service>:${SHORT_SHA}"
          echo "  - Or configure Railway to watch Docker Hub for image updates"
