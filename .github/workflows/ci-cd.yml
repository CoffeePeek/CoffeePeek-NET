name: CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            **/*.csproj
            Directory.Packages.props
            global.json
            CoffeePeek.Backend.ci.slnf

      - name: Restore backend solution
        run: dotnet restore "CoffeePeek.Backend.ci.slnf" -p:AllowMissingPrunePackageData=true

      - name: Audit dependencies
        continue-on-error: true
        run: |
          set -uo pipefail
          set +e
          report="$(dotnet list "CoffeePeek.Backend.ci.slnf" package --vulnerable --include-transitive 2>&1)"
          set -e
          echo "$report"
          {
            echo "### Vulnerable packages report"
            echo '```'
            echo "$report"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if echo "$report" | grep -qiE '>\s*Project|has the following vulnerable'; then
            echo "::warning::Vulnerable NuGet packages reported by dotnet list; see the step log and job summary"
          fi

      - name: Build backend solution
        run: dotnet build "CoffeePeek.Backend.ci.slnf" --configuration Release --no-restore -m -p:AllowMissingPrunePackageData=true

      - name: Run tests
        run: dotnet test "CoffeePeek.Backend.ci.slnf" --configuration Release --no-build -m -p:AllowMissingPrunePackageData=true --verbosity normal

  build_and_push_images:
    needs: build_and_test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: accountservice
            dockerfile: CoffeePeek.AccountService/AccountService.Dockerfile
            image: coffeepeek.accountservice
          - service: shopsservice
            dockerfile: CoffeePeek.ShopsService/ShopsService.Dockerfile
            image: coffeepeek.shopsservice
          - service: moderationservice
            dockerfile: CoffeePeek.ModerationService/ModerationService.Dockerfile
            image: coffeepeek.moderationservice
          - service: mediaservice
            dockerfile: CoffeePeek.MediaService/MediaService.Dockerfile
            image: coffeepeek.mediaservice
          - service: gateway
            dockerfile: CoffeePeek.Gateway/Gateway.Dockerfile
            image: gateway

    env:
      REGISTRY: docker.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/${{ matrix.image }}:dev
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy_vps:
    needs: build_and_push_images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '**/bin' \
            --exclude '**/obj' \
            --exclude 'deploy/.env' \
            ./ "${VPS_USER}@${VPS_HOST}:/opt/coffeepeek/"

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" \
            "export DOCKER_HUB_USERNAME='${DOCKER_HUB_USERNAME}'; \
             export DOCKER_HUB_PASSWORD='${DOCKER_HUB_PASSWORD}'; \
             set -euo pipefail; \
             cd /opt/coffeepeek/deploy && chmod +x scripts/*.sh && bash scripts/ci-deploy.sh"
