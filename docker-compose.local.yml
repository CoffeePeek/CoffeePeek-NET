version: "3.9"

# Docker Compose для локального тестирования
# Использует локальные сервисы (PostgreSQL, RabbitMQ, Redis) из этого же compose файла
# Для production используйте переменные окружения, которые переопределят эти значения

services:
  # ==================== Infrastructure Services ====================
  
  postgres-auth:
    image: postgres:17
    container_name: coffeepeek-postgres-auth
    environment:
      POSTGRES_DB: coffeepeek_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-shops:
    image: postgres:17
    container_name: coffeepeek-postgres-shops
    environment:
      POSTGRES_DB: coffeepeek_shops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-shops-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-moderation:
    image: postgres:17
    container_name: coffeepeek-postgres-moderation
    environment:
      POSTGRES_DB: coffeepeek_moderation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-moderation-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-jobs:
    image: postgres:17
    container_name: coffeepeek-postgres-jobs
    environment:
      POSTGRES_DB: coffeepeek_jobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-jobs-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: coffeepeek-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2.1
    container_name: coffeepeek-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Application Services ====================

  authservice:
    build:
      context: .
      dockerfile: CoffeePeek.AuthService/AuthService.Dockerfile
    container_name: coffeepeek-authservice
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
      - PostgresCpOptions__ConnectionString=Host=postgres-auth;Port=5432;Database=coffeepeek_auth;Username=postgres;Password=postgres;SslMode=Disable
      - RabbitMqOptions__HostName=rabbitmq
      - RabbitMqOptions__Username=admin
      - RabbitMqOptions__Password=admin
      - RabbitMqOptions__Port=5672
      - JWTOptions__SecretKey=3155126F-DD2D-4A4A-A039-18093ED2C3F6
      - JWTOptions__AccessTokenLifetimeMinutes=15
      - JWTOptions__RefreshTokenLifetimeDays=1
      - JWTOptions__Audience=CoffeePeek.API
      - JWTOptions__Issuer=CoffeePeek.WEB
      - RedisOptions__Host=redis
      - RedisOptions__Port=6379
      - RedisOptions__Password=
    ports:
      - "5001:80"
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  authservice-outbox:
    build:
      context: .
      dockerfile: OutboxBackgroundService/OutboxBackgroundService.Dockerfile
    container_name: coffeepeek-authservice-outbox
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
      - PostgresCpOptions__ConnectionString=Host=postgres-auth;Port=5432;Database=coffeepeek_auth;Username=postgres;Password=postgres;SslMode=Disable
      - RabbitMqOptions__HostName=rabbitmq
      - RabbitMqOptions__Username=admin
      - RabbitMqOptions__Password=admin
      - RabbitMqOptions__Port=5672
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      authservice:
        condition: service_started

  userservice:
    build:
      context: .
      dockerfile: CoffeePeek.UserService/UserService.Dockerfile
    container_name: coffeepeek-userservice
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
      - PostgresCpOptions__ConnectionString=Host=postgres-auth;Port=5432;Database=coffeepeek_auth;Username=postgres;Password=postgres;SslMode=Disable
      - RabbitMqOptions__HostName=rabbitmq
      - RabbitMqOptions__Username=admin
      - RabbitMqOptions__Password=admin
      - RabbitMqOptions__Port=5672
      - JWTOptions__SecretKey=3155126F-DD2D-4A4A-A039-18093ED2C3F6
      - JWTOptions__AccessTokenLifetimeMinutes=15
      - JWTOptions__RefreshTokenLifetimeDays=1
      - JWTOptions__Audience=CoffeePeek.API
      - JWTOptions__Issuer=CoffeePeek.WEB
      - RedisOptions__Host=redis
      - RedisOptions__Port=6379
      - RedisOptions__Password=
    ports:
      - "5002:80"
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  shopsservice:
    build:
      context: .
      dockerfile: CoffeePeek.ShopsService/ShopsService.Dockerfile
    container_name: coffeepeek-shopsservice
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
      - PostgresCpOptions__ConnectionString=Host=postgres-shops;Port=5432;Database=coffeepeek_shops;Username=postgres;Password=postgres;SslMode=Disable
      - RabbitMqOptions__HostName=rabbitmq
      - RabbitMqOptions__Username=admin
      - RabbitMqOptions__Password=admin
      - RabbitMqOptions__Port=5672
      - JWTOptions__SecretKey=3155126F-DD2D-4A4A-A039-18093ED2C3F6
      - JWTOptions__AccessTokenLifetimeMinutes=15
      - JWTOptions__RefreshTokenLifetimeDays=1
      - JWTOptions__Audience=CoffeePeek.API
      - JWTOptions__Issuer=CoffeePeek.WEB
      - RedisOptions__Host=redis
      - RedisOptions__Port=6379
      - RedisOptions__Password=
      - OAuthGoogleOptions__ClientId=770099870632-5eeebr3eqdrma4reson9mv02j4lro583.apps.googleusercontent.com
      - OAuthGoogleOptions__ClientSecret=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
    ports:
      - "5003:80"
    depends_on:
      postgres-shops:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  moderationservice:
    build:
      context: .
      dockerfile: CoffeePeek.ModerationService/ModerationService.Dockerfile
    container_name: coffeepeek-moderationservice
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
      - PostgresCpOptions__ConnectionString=Host=postgres-moderation;Port=5432;Database=coffeepeek_moderation;Username=postgres;Password=postgres;SslMode=Disable
      - RabbitMqOptions__HostName=rabbitmq
      - RabbitMqOptions__Username=admin
      - RabbitMqOptions__Password=admin
      - RabbitMqOptions__Port=5672
      - JWTOptions__SecretKey=3155126F-DD2D-4A4A-A039-18093ED2C3F6
      - JWTOptions__AccessTokenLifetimeMinutes=15
      - JWTOptions__RefreshTokenLifetimeDays=1
      - JWTOptions__Audience=CoffeePeek.API
      - JWTOptions__Issuer=CoffeePeek.WEB
      - YandexApiOptions__ApiKey=4b7a3c76-432e-4fd6-9ff9-16bf573d950e
      - YandexApiOptions__BaseUrl=https://geocode-maps.yandex.ru/v1/
      - YandexApiOptions__TimeoutSeconds=30
    ports:
      - "5004:80"
    depends_on:
      postgres-moderation:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  jobvacancies:
    build:
      context: .
      dockerfile: CoffeePeek.JobVacancies/JobVacancies.Dockerfile
    container_name: coffeepeek-jobvacancies
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
      - PostgresCpOptions__ConnectionString=Host=postgres-jobs;Port=5432;Database=coffeepeek_jobs;Username=postgres;Password=postgres;SslMode=Disable
      - RedisOptions__Host=redis
      - RedisOptions__Port=6379
      - RedisOptions__Password=
      - HhApi__BaseUrl=https://api.hh.ru/
      - HhApi__UserAgent=CoffeePeek/1.0 (+hh.ru integration)
      - HhApi__TimeoutSeconds=30
    ports:
      - "5005:80"
    depends_on:
      postgres-jobs:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: CoffeePeek.Gateway/Gateway.Dockerfile
    container_name: coffeepeek-gateway
    environment:
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_RUNNING_IN_CONTAINER=true
    ports:
      - "8080:80"
    depends_on:
      - authservice
      - userservice
      - shopsservice
      - moderationservice
      - jobvacancies

volumes:
  postgres-auth-data:
  postgres-shops-data:
  postgres-moderation-data:
  postgres-jobs-data:
  rabbitmq-data:
  redis-data:

networks:
  default:
    name: coffeepeek-network

