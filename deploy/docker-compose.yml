# CoffeePeek production stack for VPS (Docker Compose).
# Usage: cp .env.example .env && edit .env && docker compose up -d

name: coffeepeek

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-dotnet-common: &dotnet-common
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:80
  DOTNET_RUNNING_IN_CONTAINER: "true"

x-rabbitmq-env: &rabbitmq-env
  RabbitMqOptions__HostName: rabbitmq
  RabbitMqOptions__Port: "5672"
  RabbitMqOptions__Username: ${RABBITMQ_USER}
  RabbitMqOptions__Password: ${RABBITMQ_PASSWORD}
  RabbitMqOptions__VirtualHost: ${RABBITMQ_VHOST:-/}

x-redis-env: &redis-env
  RedisOptions__Host: redis
  RedisOptions__Port: "6379"
  RedisOptions__Password: ${REDIS_PASSWORD}

x-jwt-env: &jwt-env
  JWTOptions__SecretKey: ${JWT_SECRET_KEY}
  JWTOptions__AccessTokenLifetimeMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
  JWTOptions__RefreshTokenLifetimeDays: ${JWT_REFRESH_TOKEN_DAYS:-30}
  JWTOptions__Audience: CoffeePeek.API
  JWTOptions__Issuer: CoffeePeek.WEB

services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: public.ecr.aws/docker/library/rabbitmq:3.13-management-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/coffeepeek.shops;
      mc mb --ignore-existing local/coffeepeek.avatars
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  account:
    image: ${DOCKER_IMAGE_PREFIX}/coffeepeek.accountservice:${IMAGE_TAG}
    build:
      context: ..
      dockerfile: CoffeePeek.AccountService/AccountService.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: [*dotnet-common, *rabbitmq-env, *redis-env, *jwt-env]
      PostgresCpOptions__ConnectionString: Host=postgres;Port=5432;Database=cpaccountdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SslMode=Disable;GSS Encryption Mode=Disable
      MinIOOptions__Endpoint: http://minio:9000
      MinIOOptions__AccessKey: ${MINIO_ROOT_USER}
      MinIOOptions__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIOOptions__BucketName: coffeepeek.avatars
      OAuthGoogleOptions__ClientId: ${GOOGLE_CLIENT_ID}
      OAuthGoogleOptions__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      ResendClientOptions__ApiToken: ${RESEND_API_TOKEN}
      WebClientUrl: ${WEB_CLIENT_URL}
      AdminStatsOptions__ShopsServiceUrl: http://shops
      AdminStatsOptions__ModerationServiceUrl: http://moderation
      Sentry__Dsn: ${SENTRY_DSN_ACCOUNT:-}
    mem_limit: 768m
    memswap_limit: 768m

  shops:
    image: ${DOCKER_IMAGE_PREFIX}/coffeepeek.shopsservice:${IMAGE_TAG}
    build:
      context: ..
      dockerfile: CoffeePeek.ShopsService/ShopsService.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      <<: [*dotnet-common, *rabbitmq-env, *redis-env]
      PostgresCpOptions__ConnectionString: Host=postgres;Port=5432;Database=cpshopsdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SslMode=Disable;GSS Encryption Mode=Disable
      Sentry__Dsn: ${SENTRY_DSN_SHOPS:-}
    mem_limit: 1024m
    memswap_limit: 1024m

  moderation:
    image: ${DOCKER_IMAGE_PREFIX}/coffeepeek.moderationservice:${IMAGE_TAG}
    build:
      context: ..
      dockerfile: CoffeePeek.ModerationService/ModerationService.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: [*dotnet-common, *rabbitmq-env]
      PostgresCpOptions__ConnectionString: Host=postgres;Port=5432;Database=cpmoderationdb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SslMode=Disable;GSS Encryption Mode=Disable
      MinIOOptions__Endpoint: http://minio:9000
      MinIOOptions__AccessKey: ${MINIO_ROOT_USER}
      MinIOOptions__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIOOptions__BucketName: coffeepeek.shops
      YandexApiOptions__ApiKey: ${YANDEX_GEOCODER_API_KEY:-}
      Sentry__Dsn: ${SENTRY_DSN_MODERATION:-}
    mem_limit: 512m
    memswap_limit: 512m

  media:
    image: ${DOCKER_IMAGE_PREFIX}/coffeepeek.mediaservice:${IMAGE_TAG}
    build:
      context: ..
      dockerfile: CoffeePeek.MediaService/MediaService.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      <<: [*dotnet-common, *rabbitmq-env]
      PostgresCpOptions__ConnectionString: Host=postgres;Port=5432;Database=cpmediadb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SslMode=Disable;GSS Encryption Mode=Disable
      MinIOOptions__Endpoint: http://minio:9000
      MinIOOptions__AccessKey: ${MINIO_ROOT_USER}
      MinIOOptions__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIOOptions__ShopBucketName: coffeepeek.shops
      MinIOOptions__UserBucketName: coffeepeek.avatars
      Sentry__Dsn: ${SENTRY_DSN_MEDIA:-}
    mem_limit: 512m
    memswap_limit: 512m

  gateway:
    image: ${DOCKER_IMAGE_PREFIX}/gateway:${IMAGE_TAG}
    build:
      context: ..
      dockerfile: CoffeePeek.Gateway/Gateway.Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - account
      - shops
      - moderation
      - media
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    environment:
      <<: [*dotnet-common, *jwt-env]
      ReverseProxy__Clusters__account-cluster__Destinations__destination1__Address: http://account
      ReverseProxy__Clusters__shops-cluster__Destinations__destination1__Address: http://shops
      ReverseProxy__Clusters__moderation-cluster__Destinations__destination1__Address: http://moderation
      ReverseProxy__Clusters__media-cluster__Destinations__destination1__Address: http://media
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      Sentry__Dsn: ${SENTRY_DSN_GATEWAY:-}
    mem_limit: 512m
    memswap_limit: 512m

  caddy:
    profiles: [https]
    image: public.ecr.aws/docker/library/caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  caddy_data:
  caddy_config:
