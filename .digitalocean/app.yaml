name: coffeepeek
region: nyc

services:
  # Gateway Service
  - name: gateway
    github:
      repo: your-username/CoffeePeek-BackEnd
      branch: main
      deploy_on_push: false
    dockerfile_path: CoffeePeek.Gateway/Gateway.Dockerfile
    source_dir: /
    image:
      registry_type: DOCKER_HUB
      registry: docker.io
      repository: ${DOCKER_HUB_USERNAME}/gateway
      tag: dev
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: ASPNETCORE_URLS
        value: http://+:80
      - key: DOTNET_RUNNING_IN_CONTAINER
        value: "true"

  # Auth Service
  - name: authservice
    github:
      repo: your-username/CoffeePeek-BackEnd
